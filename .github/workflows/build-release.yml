name: Build & Publish Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Which plugin to build?'
        required: true
        type: choice
        options:
          - ColourBrickwallScream
          - CloudWash
          - gnarly2
          - nf_gnarly
          - all
      platforms:
        description: 'Which platforms to build?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      macos_vst3:
        description: 'macOS: Build VST3?'
        required: false
        default: true
        type: boolean
      macos_au:
        description: 'macOS: Build AU?'
        required: false
        default: true
        type: boolean
      macos_standalone:
        description: 'macOS: Build Standalone?'
        required: false
        default: false
        type: boolean

env:
  BUILD_TYPE: Release

jobs:
  # ============================================
  # RESOLVE PLUGIN MATRIX
  # ============================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set plugin matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.plugin }}" == "all" ]; then
            echo 'matrix={"plugin":["ColourBrickwallScream","CloudWash","gnarly2","nf_gnarly"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"plugin":["${{ inputs.plugin }}"]}' >> $GITHUB_OUTPUT
          fi

    # ============================================
  # WINDOWS BUILD
  # ============================================
  build-windows:
    needs: setup
    if: inputs.platforms == 'all' || inputs.platforms == 'windows'
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install WebView2 (direct download)
        shell: pwsh
        run: |
          $webview2Url = "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.3485.44"
          $zipPath = "$env:TEMP\webview2.zip"
          $extractPath = "$env:TEMP\webview2"
          
          Write-Host "Downloading WebView2 SDK..."
          Invoke-WebRequest -Uri $webview2Url -OutFile $zipPath -UseBasicParsing
          
          Write-Host "Extracting..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          Remove-Item $zipPath -Force
          
          # Сохраняем путь в переменную окружения (правильный синтаксис для GitHub Actions)
          echo "WEBVIEW2_PACKAGE_PATH=$extractPath" >> $env:GITHUB_ENV
          
          # Также создаем переменную для CMake через setx (на всякий случай)
          Write-Host "Setting environment variable for CMake..."
          echo "JUCE_WEBVIEW2_PACKAGE_LOCATION=$extractPath" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: pwsh
        run: |
          # Проверяем, что путь существует
          Write-Host "WEBVIEW2_PACKAGE_PATH: $env:WEBVIEW2_PACKAGE_PATH"
          Write-Host "Contents of webview2 folder:"
          Get-ChildItem "$env:WEBVIEW2_PACKAGE_PATH" -Recurse | Select-Object -First 20
          
          # Конфигурируем с явным указанием пути
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DJUCE_WEBVIEW2_PACKAGE_LOCATION="$env:WEBVIEW2_PACKAGE_PATH" `
            -DJUCE_WEBVIEW2_FORCE_OFF=OFF

      - name: Build VST3
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_VST3"

      - name: Build Standalone
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_Standalone"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -R {} dist/ \;
          find build -name "*.exe" -not -path "*/CMakeFiles/*" -exec cp {} dist/ \;
          echo "Collected:" && ls dist/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-${{ matrix.plugin }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # MACOS BUILD
  # ============================================
  build-macos:
    needs: setup
    if: inputs.platforms == 'all' || inputs.platforms == 'macos'
    runs-on: macos-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: brew install cmake || true

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build VST3
        if: inputs.macos_vst3
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_VST3"

      - name: Build AU
        if: inputs.macos_au
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_AU"

      - name: Build Standalone
        if: inputs.macos_standalone
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_Standalone"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -R {} dist/ \;
          find build -name "*.component" -exec cp -R {} dist/ \;
          find build -name "*.app" -not -path "*/CMakeFiles/*" -exec cp -R {} dist/ \;
          echo "Collected:" && ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.plugin }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # LINUX BUILD
  # ============================================
  build-linux:
    needs: setup
    if: inputs.platforms == 'all' || inputs.platforms == 'linux'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libasound2-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libjack-jackd2-dev \
            xvfb

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --target "${{ matrix.plugin }}_VST3"

      - name: Build LV2
        run: xvfb-run cmake --build build --target "${{ matrix.plugin }}_LV2"

      - name: Build Standalone
        run: xvfb-run cmake --build build --target "${{ matrix.plugin }}_Standalone"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -R {} dist/ \;
          find build -name "*.lv2" -exec cp -R {} dist/ \;
          find build -name "${{ matrix.plugin }}" -type f -exec cp {} dist/ \;
          echo "Collected:" && ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-${{ matrix.plugin }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

